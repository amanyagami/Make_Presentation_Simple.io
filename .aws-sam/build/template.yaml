Transform: AWS::Serverless-2016-10-31
Description: PDF to deck pipeline with preprocess and process workflows
Parameters:
  HFToken:
    Type: String
    NoEcho: true
    Description: Hugging Face token used by call_model Lambda
Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512
Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
  JobTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: upload_id
        AttributeType: S
      KeySchema:
      - AttributeName: upload_id
        KeyType: HASH
  CreateUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateUploadFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
      Policies:
      - S3WritePolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /upload
            Method: post
    Metadata:
      SamResourceId: CreateUploadFunction
  StartPreprocessFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: StartPreprocessFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE:
            Ref: JobTable
          STATE_MACHINE_ARN:
            Ref: PreprocessStateMachine
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
      - StepFunctionsExecutionPolicy:
          StateMachineName:
            Fn::GetAtt:
            - PreprocessStateMachine
            - Name
      Events:
        Api:
          Type: Api
          Properties:
            Path: /preprocess/{upload_id}
            Method: post
    Metadata:
      SamResourceId: StartPreprocessFunction
  StatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: StatusFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE:
            Ref: JobTable
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: JobTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /status/{upload_id}
            Method: get
    Metadata:
      SamResourceId: StatusFunction
  RenderPreviewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RenderPreviewsFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
    Metadata:
      SamResourceId: RenderPreviewsFunction
  ExtractTextFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ExtractTextFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
    Metadata:
      SamResourceId: ExtractTextFunction
  StartProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: StartProcessingFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE:
            Ref: JobTable
          STATE_MACHINE_ARN:
            Ref: ProcessStateMachine
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
      - StepFunctionsExecutionPolicy:
          StateMachineName:
            Fn::GetAtt:
            - ProcessStateMachine
            - Name
      Events:
        Api:
          Type: Api
          Properties:
            Path: /process/{upload_id}
            Method: post
    Metadata:
      SamResourceId: StartProcessingFunction
  CropFiguresFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CropFiguresFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
    Metadata:
      SamResourceId: CropFiguresFunction
  CallModelFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CallModelFunction
      Handler: app.lambda_handler
      Timeout: 300
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
          HF_TOKEN:
            Ref: HFToken
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
    Metadata:
      SamResourceId: CallModelFunction
  WriteFinalJsonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WriteFinalJsonFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
      Policies:
      - S3WritePolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
    Metadata:
      SamResourceId: WriteFinalJsonFunction
  CleanupDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CleanupDataFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          BUCKET:
            Ref: ArtifactBucket
          TABLE:
            Ref: JobTable
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: ArtifactBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: JobTable
    Metadata:
      SamResourceId: CleanupDataFunction
  PreprocessStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: ../../statemachine/preprocess.asl.json
      DefinitionSubstitutions:
        ExtractTextFunctionArn:
          Fn::GetAtt:
          - ExtractTextFunction
          - Arn
        RenderPreviewsFunctionArn:
          Fn::GetAtt:
          - RenderPreviewsFunction
          - Arn
      Policies:
      - LambdaInvokePolicy:
          FunctionName:
            Ref: ExtractTextFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: RenderPreviewsFunction
  ProcessStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: ../../statemachine/process.asl.json
      DefinitionSubstitutions:
        CropFiguresFunctionArn:
          Fn::GetAtt:
          - CropFiguresFunction
          - Arn
        CallModelFunctionArn:
          Fn::GetAtt:
          - CallModelFunction
          - Arn
        WriteFinalJsonFunctionArn:
          Fn::GetAtt:
          - WriteFinalJsonFunction
          - Arn
        CleanupDataFunctionArn:
          Fn::GetAtt:
          - CleanupDataFunction
          - Arn
      Policies:
      - LambdaInvokePolicy:
          FunctionName:
            Ref: CropFiguresFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: CallModelFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: WriteFinalJsonFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: CleanupDataFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  ArtifactBucketName:
    Value:
      Ref: ArtifactBucket
  JobTableName:
    Value:
      Ref: JobTable
