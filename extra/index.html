<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slide Deck Viewer</title>
  <style>
    /* === Design System === */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fb;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent: #3b82f6;
      --accent-dark: #1e40af;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
      --transition: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === Main Container === */
    .viewer-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === Deck Canvas === */
    .deck-canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    .deck-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* === Deck & Slides === */
    .deck {
      width: 100%;
      height: 100%;
      max-width: 95vw;
      max-height: 85vh;
      position: relative;
      z-index: 1;
      perspective: 1000px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 2.5rem;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(20px) rotateY(-5deg);
      transition: opacity var(--transition), transform var(--transition);
      animation: slideEnter var(--transition) forwards;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .slide.has-background {
      position: relative;
    }

    .slide.has-background::before {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      border-radius: 12px;
      z-index: 0;
    }

    .slide.has-background > * {
      position: relative;
      z-index: 1;
    }

    @keyframes slideEnter {
      from {
        opacity: 0;
        transform: translateY(20px) rotateY(-5deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotateY(0);
      }
    }

    .slide.active {
      display: flex;
      flex-direction: column;
      opacity: 1;
      transform: translateY(0) rotateY(0);
    }

    .slide.exit {
      animation: slideExit var(--transition) forwards;
    }

    @keyframes slideExit {
      from {
        opacity: 1;
        transform: translateY(0) rotateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-20px) rotateY(5deg);
      }
    }

    /* === Slide Header === */
    .slide-header {
      margin-bottom: 1.5rem;
      animation: fadeInDown 600ms ease-out 100ms both;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .slide.type-image h1,
    .slide.type-mixed h1 {
      font-size: 1.75rem;
    }

    .slide-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin: 0;
      font-weight: 400;
      line-height: 1.5;
    }

    /* === Slide Badge === */
    .slide-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding: 0.4rem 0.8rem;
      background: linear-gradient(135deg, var(--bg-secondary), transparent);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      width: fit-content;
    }

    .slide-badge::before {
      content: attr(data-type);
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* === Image Container === */
    .slide-image {
      width: 100%;
      max-height: 35%;
      border-radius: 8px;
      margin: 1rem 0;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      animation: fadeInUp 600ms ease-out 200ms both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* === Content Area === */
    .slide-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .slide-content::-webkit-scrollbar {
      width: 6px;
    }

    .slide-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .slide-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .slide-content::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* === Steps List === */
    .slide-steps {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 1rem;
    }

    .step {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      border-left: 3px solid var(--border);
      opacity: 0;
      transform: translateX(-20px);
      transition: opacity var(--transition-fast), transform var(--transition-fast), 
                  background-color var(--transition-fast), border-color var(--transition-fast);
    }

    .step.visible {
      opacity: 1;
      transform: translateX(0);
      border-left-color: var(--accent);
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.03) 0%, transparent 100%);
    }

    .step-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      box-shadow: var(--shadow-sm);
    }

    .step.visible .step-number {
      animation: scaleIn 400ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.8);
      }
      to {
        transform: scale(1);
      }
    }

    .step-content {
      flex: 1;
      min-width: 0;
    }

    .step-content h3 {
      margin: 0 0 0.4rem 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .step-content p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .step-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color var(--transition-fast);
    }

    .step-content a:hover {
      border-bottom-color: var(--accent);
    }

    .step-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .step-content em {
      color: var(--accent);
      font-style: italic;
    }

    /* === Notes === */
    .slide-notes {
      margin-top: 1.5rem;
      padding: 0.8rem;
      background: var(--bg-secondary);
      border-radius: 6px;
      border-left: 3px solid var(--text-secondary);
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      animation: fadeInUp 600ms ease-out 400ms both;
    }

    .slide-notes strong {
      color: var(--text-primary);
    }

    /* === Empty State === */
    .slide-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-secondary);
      text-align: center;
      font-style: italic;
    }

    /* === Mode Selector === */
    .mode-selector {
      position: fixed;
      top: 2rem;
      right: 2rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .mode-selector label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
      margin-right: 0.5rem;
    }

    .mode-selector select {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color var(--transition-fast);
    }

    .mode-selector select:hover {
      border-color: var(--accent);
    }

    .mode-selector select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .mode-selector button {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition-fast);
      white-space: nowrap;
    }

    .mode-selector button:hover {
      background: var(--accent-dark);
    }

    .mode-selector input[type="file"] {
      display: none;
    }

    /* === Navigation Controls === */
    .controls {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .controls-counter {
      font-weight: 600;
      color: var(--text-primary);
      min-width: 60px;
      text-align: center;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .controls-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .controls-info {
      font-size: 0.85rem;
      color: var(--text-secondary);
      min-width: 120px;
    }

    .controls-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* === Keyboard Hint === */
    .keyboard-hint {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
    }

    .keyboard-hint kbd {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-weight: 500;
      font-size: 0.8rem;
      margin: 0 0.25rem;
    }

    /* === Error State === */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .error-state h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .error-state p {
      color: var(--text-secondary);
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .error-state button {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .error-state button:hover {
      background: var(--accent-dark);
    }

    /* === Loading State === */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      color: var(--text-secondary);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === Responsive === */
    @media (max-width: 1024px) {
      .slide {
        padding: 2rem;
      }

      .slide h1 {
        font-size: 1.75rem;
      }

      .controls {
        bottom: 1rem;
        right: 1rem;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
      }

      .keyboard-hint {
        display: none;
      }

      .mode-selector {
        top: 1rem;
        right: 1rem;
        padding: 0.5rem 0.75rem;
      }
    }

    @media (max-width: 640px) {
      .deck-canvas {
        padding: 1rem;
      }

      .slide {
        padding: 1.5rem;
        border-radius: 8px;
      }

      .slide h1 {
        font-size: 1.5rem;
      }

      .slide-subtitle {
        font-size: 0.95rem;
      }

      .slide-image {
        margin: 1rem 0;
      }

      .step {
        padding: 0.875rem;
        gap: 0.875rem;
      }

      .step-number {
        width: 32px;
        height: 32px;
        font-size: 0.85rem;
      }

      .controls {
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
        flex-direction: column;
        justify-content: center;
        gap: 0.5rem;
        padding: 1rem;
      }

      .controls-divider {
        display: none;
      }

      .controls-counter {
        min-width: unset;
      }

      .controls-info {
        min-width: unset;
      }

      .mode-selector {
        top: 1rem;
        right: 1rem;
        left: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="mode-selector">
  <label for="modeSelect">Mode:</label>
  <select id="modeSelect">
    <option value="default">Default</option>
  </select>
  <button id="uploadModeBtn">+ Add Mode</button>
  <input type="file" id="modeImageInput" accept="image/*" />
</div>

<div class="viewer-container">
  <div class="deck-canvas">
    <div class="deck" id="deck"></div>
  </div>
</div>

<div class="controls">
  <span class="controls-counter" id="counter">0 / 0</span>
  <div class="controls-divider"></div>
  <span class="controls-info">
    <span class="controls-hint">Use</span>
    <kbd>→</kbd>
    <span class="controls-hint">or</span>
    <kbd>Space</kbd>
  </span>
</div>

<div class="keyboard-hint">
  Navigation: <kbd>→</kbd> next • <kbd>←</kbd> prev • <kbd>Space</kbd> or <kbd>Enter</kbd> continue
</div>

<script>
/* === Utilities === */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function markdownToHtml(md) {
  if (!md) return '';

  let html = escapeHtml(md);

  // Links
  html = html.replace(
    /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
  );

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/_([^_]+)_/g, '<em>$1</em>');

  // Line breaks
  html = html.replace(/\n/g, '<br>');

  return html;
}

function safeSrc(src) {
  if (!src) return null;
  try {
    const url = new URL(src, location.href);
    return (url.protocol === 'https:' || url.protocol === 'http:') ? url.href : null;
  } catch (e) {
    return null;
  }
}

/* === State === */
let slides = [];
let slideIndex = 0;
let stepIndex = -1;
let currentSteps = [];
let modes = { default: null };
let currentMode = 'default';

/* === Mode Management === */
function saveModesToStorage() {
  try {
    localStorage.setItem('slideModes', JSON.stringify(modes));
  } catch (e) {
    console.error('Failed to save modes:', e);
  }
}

function loadModesFromStorage() {
  try {
    const saved = localStorage.getItem('slideModes');
    if (saved) {
      modes = JSON.parse(saved);
      updateModeSelect();
    }
  } catch (e) {
    console.error('Failed to load modes:', e);
  }
}

function updateModeSelect() {
  const select = document.getElementById('modeSelect');
  select.innerHTML = '';
  
  Object.keys(modes).forEach(modeName => {
    const option = document.createElement('option');
    option.value = modeName;
    option.textContent = modeName.charAt(0).toUpperCase() + modeName.slice(1);
    if (modeName === currentMode) {
      option.selected = true;
    }
    select.appendChild(option);
  });
}

function applyModeToSlides() {
  const backgroundImage = modes[currentMode];
  slides.forEach(slide => {
    if (backgroundImage) {
      slide.style.backgroundImage = `url(${backgroundImage})`;
      slide.classList.add('has-background');
    } else {
      slide.style.backgroundImage = '';
      slide.classList.remove('has-background');
    }
  });
}

/* === Event Listeners for Mode === */
document.getElementById('uploadModeBtn').addEventListener('click', () => {
  document.getElementById('modeImageInput').click();
});

document.getElementById('modeImageInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    const modeName = prompt('Enter a name for this mode:', `Mode ${Object.keys(modes).length}`);
    if (!modeName) return;

    const sanitizedName = modeName.toLowerCase().replace(/[^a-z0-9]/g, '_');
    modes[sanitizedName] = event.target.result;
    saveModesToStorage();
    updateModeSelect();
    
    // Auto-switch to new mode
    currentMode = sanitizedName;
    document.getElementById('modeSelect').value = sanitizedName;
    applyModeToSlides();
  };
  reader.readAsDataURL(file);
  
  // Reset input
  e.target.value = '';
});

document.getElementById('modeSelect').addEventListener('change', (e) => {
  currentMode = e.target.value;
  applyModeToSlides();
});

/* === Slide Creation === */
function createSlide(data, index) {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.slideIndex = index;
  slide.dataset.slideId = data.id || '';
  slide.dataset.type = data.type || 'content';
  slide.classList.add(`type-${data.type || 'content'}`);

  // Header
  const header = document.createElement('div');
  header.className = 'slide-header';

  const title = document.createElement('h1');
  title.textContent = data.title || '';

  const subtitle = document.createElement('p');
  subtitle.className = 'slide-subtitle';
  subtitle.textContent = data.subtitle || '';

  header.appendChild(title);
  if (data.subtitle) {
    header.appendChild(subtitle);
  }

  const badge = document.createElement('div');
  badge.className = 'slide-badge';
  badge.setAttribute('data-type', data.type || 'content');
  header.appendChild(badge);

  slide.appendChild(header);

  // Image (if present)
  if (data.image_ref) {
    const src = safeSrc(data.image_ref);
    if (src) {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'slide-image';
      const img = document.createElement('img');
      img.src = src;
      img.alt = data.title || 'Slide image';
      img.loading = 'lazy';
      img.decoding = 'async';
      imgWrap.appendChild(img);
      slide.appendChild(imgWrap);
    }
  }

  // Content (steps)
  const content = document.createElement('div');
  content.className = 'slide-content';

  if (data.steps && data.steps.length > 0) {
    const stepsList = document.createElement('ul');
    stepsList.className = 'slide-steps';

    data.steps.forEach(step => {
      const li = document.createElement('li');
      li.className = 'step';

      const number = document.createElement('div');
      number.className = 'step-number';
      number.textContent = step.number || '';

      const stepContent = document.createElement('div');
      stepContent.className = 'step-content';

      const heading = document.createElement('h3');
      heading.textContent = step.heading || '';

      const paragraph = document.createElement('p');
      paragraph.innerHTML = markdownToHtml(step.content || '');

      stepContent.appendChild(heading);
      stepContent.appendChild(paragraph);

      li.appendChild(number);
      li.appendChild(stepContent);
      stepsList.appendChild(li);
    });

    content.appendChild(stepsList);
  } else {
    const empty = document.createElement('div');
    empty.className = 'slide-empty';
    empty.textContent = data.notes || 'No content available for this slide.';
    content.appendChild(empty);
  }

  // Notes (if present)
  if (data.notes) {
    const notes = document.createElement('div');
    notes.className = 'slide-notes';
    notes.innerHTML = markdownToHtml(data.notes);
    content.appendChild(notes);
  }

  slide.appendChild(content);

  return slide;
}

/* === Navigation === */
function activateSlide(index) {
  // Remove active from all slides
  slides.forEach((s, i) => {
    if (i === slideIndex) {
      s.classList.add('exit');
      setTimeout(() => {
        s.classList.remove('active', 'exit');
      }, 350);
    }
  });

  slideIndex = Math.max(0, Math.min(index, slides.length - 1));
  const activeSlide = slides[slideIndex];

  activeSlide.classList.add('active');

  // Reset steps
  currentSteps = Array.from(activeSlide.querySelectorAll('.step'));
  currentSteps.forEach(st => st.classList.remove('visible'));
  stepIndex = -1;

  // Update counter
  updateCounter();
}

function showNext() {
  if (stepIndex < currentSteps.length - 1) {
    stepIndex++;
    currentSteps[stepIndex].classList.add('visible');
  } else if (slideIndex < slides.length - 1) {
    activateSlide(slideIndex + 1);
  }
}

function showPrev() {
  if (stepIndex > 0) {
    currentSteps[stepIndex].classList.remove('visible');
    stepIndex--;
  } else if (stepIndex === 0) {
    currentSteps[stepIndex].classList.remove('visible');
    stepIndex = -1;
  } else if (slideIndex > 0) {
    activateSlide(slideIndex - 1);
    // Skip to last step of previous slide
    setTimeout(() => {
      if (currentSteps.length > 0) {
        stepIndex = currentSteps.length - 1;
        currentSteps[stepIndex].classList.add('visible');
      }
    }, 0);
  }
}

function updateCounter() {
  const counter = document.getElementById('counter');
  counter.textContent = `${slideIndex + 1} / ${slides.length}`;
}

/* === Event Listeners === */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    showNext();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    showPrev();
  }
});

document.addEventListener('click', (e) => {
  const tag = e.target.tagName.toLowerCase();
  if (['a', 'button', 'input', 'textarea', 'select', 'iframe'].includes(tag)) return;
  showNext();
});

/* === Initialization === */
async function init() {
  const container = document.getElementById('deck');
  // Load saved modes
  loadModesFromStorage();
  
  // Always load final.json only
  const manifestFetchUrl = 'final.json';
  console.log('Fetching manifest:', manifestFetchUrl);

  try {
    const response = await fetch(manifestFetchUrl, { cache: 'no-cache' });
    if (!response.ok) throw new Error('Network error');
    const manifest = await response.json();

    if (!manifest.slides || !Array.isArray(manifest.slides) || manifest.slides.length === 0) {
      throw new Error('No slides found in manifest');
    }

    // Sort slides by order if present
    const sortedSlides = manifest.slides.slice().sort((a, b) => {
      const orderA = Number(a.order);
      const orderB = Number(b.order);
      if (!isFinite(orderA) && !isFinite(orderB)) return 0;
      if (!isFinite(orderA)) return 1;
      if (!isFinite(orderB)) return -1;
      return orderA - orderB;
    });

    // Create slide elements
    sortedSlides.forEach((slideData, idx) => {
      const slide = createSlide(slideData, idx);
      container.appendChild(slide);
    });

    slides = Array.from(document.querySelectorAll('.slide'));

    // Apply current mode
    applyModeToSlides();

    if (slides.length > 0) {
      activateSlide(0);
    } else {
      throw new Error('Failed to create slides');
    }
  } catch (error) {
    container.innerHTML = `
      <div class="error-state">
        <h2>Failed to Load Deck</h2>
        <p>${escapeHtml(error.message)}</p>
        <button onclick="location.reload()">Retry</button>
      </div>
    `;
  }
}

// Start initialization
init();
</script>
