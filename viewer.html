<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Deck from index.json (custom format)</title>
<style>
  :root{
    --bg:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --accent:#2563eb;
    --border:#e5e7eb;
    --anim:400ms;
  }
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
  body{display:flex;align-items:center;justify-content:center;padding:2rem}
  .deck{width:900px;max-width:100%;position:relative}
  .slide{display:none;width:100%}
  .slide.active{display:block}
  h1{font-size:2rem;margin-bottom:0.5rem}
  .subtitle{color:var(--muted);margin-bottom:1.25rem}
  .steps{list-style:none;padding:0;margin:0;display:grid;gap:1.25rem}
  .step{display:flex;gap:1rem;padding:1rem;border:1px solid var(--border);border-radius:10px;
    opacity:0;transform:translateY(10px);transition:opacity var(--anim) ease, transform var(--anim) ease}
  .step.visible{opacity:1;transform:none}
  .number{width:42px;height:42px;min-width:42px;border-radius:8px;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:600}
  .content h3{margin:0 0 0.3rem 0}
  .content .md{margin:0;color:var(--muted);font-size:0.95rem}
  .hint{margin-top:1.5rem;color:var(--muted);font-size:0.9rem}
  .img-wrap{width:100%;max-width:100%;margin-top:0.75rem;border-radius:8px;overflow:hidden;background:#f3f4f6;display:block;aspect-ratio:16/6}
  .img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
  .table-wrap{width:100%;margin-top:0.75rem;border-radius:8px;overflow:hidden;border:1px solid var(--border);min-height:240px;background:#fff}
  .table-wrap iframe{width:100%;height:100%;border:0;display:block}
  .caption{font-size:0.9rem;color:var(--muted);margin-top:0.5rem}
  .controls{position:fixed;right:1rem;bottom:1rem;background:rgba(255,255,255,0.9);border:1px solid var(--border);padding:.5rem;border-radius:8px;font-size:0.9rem;color:var(--muted)}
  .meta{display:flex;gap:1rem;align-items:center;margin-top:0.5rem}
  .open-link{color:var(--accent);text-decoration:none;border:1px solid transparent;padding:.25rem .5rem;border-radius:6px;font-size:0.9rem}
  .open-link:hover{background:#f8fafc;border-color:var(--border)}
  .placeholder{padding:1rem;border:1px dashed var(--border);border-radius:8px}
</style>
</head>
<body>

<div class="deck" id="deck"></div>

<div class="controls">
  <span id="pos">0 / 0</span>
</div>

<script>
/* Utilities */
function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function markdownToHtml(md){
  if(!md) return '';
  let html = escapeHtml(md);
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
  const parts = html.split(/
\s*
/).map(p => p.trim()).filter(Boolean);
  return parts.map(p => `<p>${p.replace(/
/g,'<br>')}</p>`).join('');
}

function safeSrc(src){
  try{
    const u = new URL(src, location.href);
    return (u.protocol === 'https:' || u.protocol === 'http:') ? u.href : null;
  }catch(e){
    return null;
  }
}

/* store original slide JSON on DOM nodes */
const slideDataMap = new WeakMap();

/* Create a minimal placeholder slide (title/subtitle plus placeholder) */
function createSlidePlaceholder(data, index){
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.slideIndex = index;
  slide.setAttribute('data-slide-id', data.id || '');

  const title = document.createElement('h1');
  title.textContent = data.title || '';
  slide.appendChild(title);

  const sub = document.createElement('div');
  sub.className = 'subtitle';
  sub.textContent = data.subtitle || '';
  slide.appendChild(sub);

  const meta = document.createElement('div');
  meta.className = 'meta';
  if(data.url){
    const s = safeSrc(data.url);
    if(s){
      const a = document.createElement('a');
      a.href = s;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'open-link';
      a.textContent = 'Open';
      meta.appendChild(a);
    }
  }
  if(data.order !== undefined){
    const ord = document.createElement('div');
    ord.className = 'caption';
    ord.textContent = `order: ${data.order}`;
    meta.appendChild(ord);
  }
  slide.appendChild(meta);

  const ph = document.createElement('div');
  ph.className = 'placeholder';
  ph.textContent = 'Loading slide content...';
  slide.appendChild(ph);

  slideDataMap.set(slide, data);
  return slide;
}

/* Build a step DOM node from step data */
function createStepNode(step){
  const li = document.createElement('li');
  li.className = 'step';

  const number = document.createElement('div');
  number.className = 'number';
  number.textContent = step.number || '';

  const content = document.createElement('div');
  content.className = 'content';

  const h3 = document.createElement('h3');
  h3.textContent = step.heading || '';

  const mdDiv = document.createElement('div');
  mdDiv.className = 'md';
  mdDiv.innerHTML = markdownToHtml(step.body_markdown || step.content || '');

  content.appendChild(h3);
  content.appendChild(mdDiv);

  li.appendChild(number);
  li.appendChild(content);

  return li;
}

/* Fill a slide with full content (steps, hero image, table embed) */
function fillSlide(slide){
  if(slide.dataset.filled === '1') return;
  const data = slideDataMap.get(slide);
  if(!data) return;

  const ph = slide.querySelector('.placeholder');
  if(ph) ph.remove();

  // hero image (image_url or image_ref)
  const imageCandidate = data.image_url || data.image_ref;
  if(imageCandidate){
    const src = safeSrc(imageCandidate);
    if(src){
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      const img = document.createElement('img');
      img.setAttribute('data-src', src); // lazy
      img.alt = data.title || '';
      img.loading = 'lazy';
      img.decoding = 'async';
      wrap.appendChild(img);
      // place hero image before steps
      slide.appendChild(wrap);
    }
  }

  // steps list
  const steps = document.createElement('ul');
  steps.className = 'steps';
  (data.steps || []).forEach(s => {
    steps.appendChild(createStepNode(s));
  });
  slide.appendChild(steps);

  // table embed (table_url or embedded_table)
  const tableUrl = data.table_url || data.table;
  if(tableUrl){
    const turl = safeSrc(tableUrl);
    if(turl){
      const twrap = document.createElement('div');
      twrap.className = 'table-wrap';
      const iframe = document.createElement('iframe');
      iframe.setAttribute('data-src', turl);
      iframe.loading = 'lazy';
      iframe.sandbox = ''; // strict sandbox by default
      twrap.appendChild(iframe);

      const caption = document.createElement('div');
      caption.className = 'caption';
      caption.innerHTML = `Embedded table (or <a href="${turl}" target="_blank" rel="noopener noreferrer">open in new tab</a>)`;
      slide.appendChild(twrap);
      slide.appendChild(caption);
    }
  }

  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.textContent = 'Click or use Space/Enter/→ to reveal';
  slide.appendChild(hint);

  slide.dataset.filled = '1';
}

/* activate images and iframes (swap data-src -> src) */
function activateMediaForSlide(slide){
  slide.querySelectorAll('img[data-src]').forEach(img => {
    if(!img.src){
      img.src = img.dataset.src;
    }
  });
  slide.querySelectorAll('iframe[data-src]').forEach(iframe => {
    if(!iframe.src){
      iframe.src = iframe.dataset.src;
    }
  });
}

/* state */
let slides = [];
let slideIndex = 0;
let stepIndex = -1;
let currentSteps = [];

/* activate slide i (shows it, fills content lazily) */
function activateSlide(i){
  slides.forEach(s => s.classList.remove('active'));
  const s = slides[i];
  s.classList.add('active');

  fillSlide(s);
  activateMediaForSlide(s);

  currentSteps = Array.from(s.querySelectorAll('.step'));
  currentSteps.forEach(st => st.classList.remove('visible'));
  stepIndex = -1;

  slideIndex = i;
  document.getElementById('pos').textContent = `${slideIndex+1} / ${slides.length}`;
}

/* navigation */
function showNext(){
  if(stepIndex < currentSteps.length - 1){
    stepIndex++;
    currentSteps[stepIndex].classList.add('visible');
  } else if(slideIndex < slides.length - 1){
    activateSlide(slideIndex + 1);
  }
}

function showPrev(){
  if(stepIndex >= 0){
    currentSteps[stepIndex].classList.remove('visible');
    stepIndex--;
  } else if(slideIndex > 0){
    activateSlide(slideIndex - 1);
  }
}

/* keyboard & click */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); showNext(); }
  else if(e.key === 'ArrowLeft'){ e.preventDefault(); showPrev(); }
});

document.addEventListener('click', (e)=>{
  const tag = e.target.tagName.toLowerCase();
  if(['a','button','input','textarea','select','iframe'].includes(tag)) return;
  showNext();
});

/* fetch manifest, build placeholders, sort by order */
async function init(){
  const deckEl = document.getElementById('deck');
  const params = new URLSearchParams(location.search);
  const manifestUrl = params.get('manifest') || '/index.json';

  let manifest;
  try{
    const res = await fetch(manifestUrl, {cache:'no-cache'});
    if(!res.ok) throw new Error('network');
    manifest = await res.json();
  }catch(e){
    deckEl.innerHTML = '<div class="slide active"><h1>Failed to load index.json</h1></div>';
    return;
  }

  const rawSlides = Array.isArray(manifest.slides) ? manifest.slides.slice() : [];

  // sort by numeric order if present (fall back to original order)
  rawSlides.sort((a,b) => {
    const na = Number(a.order);
    const nb = Number(b.order);
    if(!isFinite(na) && !isFinite(nb)) return 0;
    if(!isFinite(na)) return 1;
    if(!isFinite(nb)) return -1;
    return na - nb;
  });

  rawSlides.forEach((slideData, idx) => {
    deckEl.appendChild(createSlidePlaceholder(slideData, idx));
  });

  slides = Array.from(document.querySelectorAll('.slide'));
  if(slides.length > 0){
    activateSlide(0);
  } else {
    deckEl.innerHTML = '<div class="slide active"><h1>No slides found in manifest</h1></div>';
  }
}

init();
</script>
</body>
</html>
